name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-gates:
    name: Frontend release gates
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: yarn test:unit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke
        env:
          POSA_SMOKE_BASE_URL: ${{ secrets.POSA_SMOKE_BASE_URL }}
          POSA_SMOKE_PATH: ${{ vars.POSA_SMOKE_PATH || '/app/posapp' }}
          POSA_SMOKE_USER: ${{ secrets.POSA_SMOKE_USER }}
          POSA_SMOKE_PASSWORD: ${{ secrets.POSA_SMOKE_PASSWORD }}
        run: yarn test:smoke

  backend-gates:
    name: Backend release gates
    runs-on: ubuntu-22.04
    services:
      mariadb:
        image: mariadb:10.6
        ports:
          - 3306:3306
        env:
          MYSQL_USER: user
          MYSQL_PASSWORD: frappe
          MYSQL_DATABASE: test
          MYSQL_ROOT_PASSWORD: frappe
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt ruff frappe-bench
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libmysqlclient-dev

      - name: Ruff syntax smoke
        run: python -m ruff check --select E9,F63,F7 posawesome

      - name: Initialize Frappe bench
        run: bench init --frappe-branch version-15 --python python3 frappe-bench

      - name: Create test site and install POS Awesome
        run: |
          cd frappe-bench
          bench new-site example.com \
            --mariadb-root-password frappe \
            --admin-password frappe \
            --no-mariadb-socket
          bench get-app --branch version-15 https://github.com/frappe/erpnext
          bench --site example.com install-app erpnext
          bench get-app "$GITHUB_WORKSPACE"
          bench --site example.com install-app posawesome

      - name: POS Awesome backend unit smoke
        run: python -m unittest discover -s posawesome/posawesome/api -p "test_offline_sync_*.py"

  build-gates:
    name: Build release gates
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            frontend/yarn.lock

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Production build
        run: yarn build

      - name: Build verifier tests
        run: yarn test:build-verify

      - name: Verify POS assets and checksums
        run: yarn verify:build

      - name: Electron package smoke
        run: yarn electron:smoke

      - name: Upload build provenance
        uses: actions/upload-artifact@v4
        with:
          name: release-build-provenance
          path: |
            posawesome/public/dist/js/version.json
            posawesome/public/dist/js/checksums.sha256
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: windows-latest
    needs:
      - frontend-gates
      - backend-gates
      - build-gates
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            frontend/yarn.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
